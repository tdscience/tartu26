name: Publish to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/itsleeds/tds:latest
      options: --user root
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify R packages
        run: |
          Rscript -e 'pkgs <- c("sf", "tmap", "stplanr", "dodgr", "osmdata", "stats19", "spanishoddata", "flowmapblue", "tidyverse", "lubridate"); missing <- pkgs[!sapply(pkgs, requireNamespace, quietly = TRUE)]; if (length(missing) > 0) stop("Missing: ", paste(missing, collapse = ", ")) else cat("All packages available\n")'

      - name: Render Quarto
        run: quarto render

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
